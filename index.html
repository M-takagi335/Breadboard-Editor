<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ブレッドボード回路エディタ | Breadboard Studio</title>
<style>
:root{
  --bg:#eef1f5;--panel:#fff;--line:#d8dee8;--text:#243042;--muted:#64748b;
  --accent:#1f9cff;--wire:#22c55e;--board:#f4f4ef;--edge:#d8d7cd;--hole:#444;
  --red:#e53935;--blue:#3478f6;--shadow:0 10px 30px rgba(21,31,46,.09);
  --pitch-x:27px;--pitch-y:26px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button,input,select{font:inherit}
.topbar{height:58px;background:linear-gradient(180deg,#ffffff,#f7f9fc);border-bottom:1px solid #d9e2ee;display:flex;align-items:center;gap:12px;padding:0 16px}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;color:#223046;letter-spacing:.02em}
.brand-mark{position:relative;width:42px;height:32px;border-radius:11px;background:linear-gradient(135deg,#0ea5e9 0%,#6366f1 100%);box-shadow:0 6px 18px rgba(37,99,235,.18), inset 0 0 0 1px rgba(255,255,255,.28);flex:none}
.brand-mark .trace{position:absolute;left:8px;right:8px;top:15px;height:2px;background:rgba(255,255,255,.92);border-radius:999px}
.brand-mark .node{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.18)}
.brand-mark .n1{left:7px;top:6px}
.brand-mark .n2{left:17px;top:20px}
.brand-mark .n3{right:7px;top:8px}
.brand-name{display:flex;flex-direction:column;line-height:1.05}
.brand-name strong{font-size:14px;color:#223046}
.brand-name small{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.spacer{flex:1}.pill{border:1px solid #d4dbe6;background:#fff;border-radius:10px;padding:8px 14px;font-size:12px}.pill.primary{background:#eef6ff;border-color:#bfdbfe;color:#1d4ed8;font-weight:700}

.app{display:grid;grid-template-columns:64px 1fr 320px;height:calc(100vh - 54px);transition:grid-template-columns .18s ease}
.app.sidebar-minimized{grid-template-columns:64px 1fr 44px}
.lefttools{background:#fafbfc;border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 8px;overflow:hidden}
.toolbtn{width:44px;height:44px;border-radius:12px;border:1px solid #d7deea;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.toolbtn.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,156,255,.14)}
.toolbtn.wire-active{border-color:#22c55e;background:#ecfdf5;box-shadow:0 0 0 4px rgba(34,197,94,.22)}

.main{position:relative;overflow:hidden;cursor:default}
.main.panning{cursor:grabbing}
.toolbar{position:absolute;left:18px;top:14px;display:flex;gap:8px;z-index:40}
.toolbar button{border:1px solid #d4dbe6;background:#fff;color:#324154;border-radius:10px;padding:8px 12px;cursor:pointer;box-shadow:var(--shadow)}
.status{position:absolute;left:18px;right:18px;bottom:14px;background:rgba(255,255,255,.94);border:1px solid #d9dfeb;border-radius:14px;padding:10px 14px;z-index:40;box-shadow:var(--shadow);font-size:12px;color:var(--muted)}
.status strong{color:#243042;margin-right:10px}
#workspace{position:absolute;inset:0;transform-origin:0 0;overflow:visible}
.stage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);overflow:visible}
.board{position:relative;width:1040px;height:610px;background:var(--board);border:1px solid var(--edge);border-radius:16px;box-shadow:0 25px 70px rgba(59,76,100,.18),inset 0 0 0 4px #ecebe3;overflow:visible}
#wireLayer{position:absolute;inset:0;overflow:visible;pointer-events:none;z-index:20}
.center-cut{position:absolute;left:34px;right:34px;top:285px;height:32px;background:#ddddcf;border-radius:8px;box-shadow:inset 0 1px 4px rgba(0,0,0,.08);z-index:1;pointer-events:none}
.rail{position:absolute;left:26px;right:26px;height:78px;border-radius:12px;background:#ecebe3;border:1px solid #d8d6cb}
.rail.top{top:18px}.rail.bottom{bottom:18px}
.rail .stripe{position:absolute;left:58px;right:58px;height:3px;border-radius:999px}
.rail .stripe.red{top:14px;background:var(--red)}.rail .stripe.blue{bottom:14px;background:var(--blue)}
.railholes{position:absolute;left:88px;width:812px;display:grid;grid-template-columns:repeat(30,18px);gap:0 9px;z-index:3}
.railholes.red{top:5px}.railholes.blue{bottom:5px}
.cols{position:absolute;left:114px;width:812px;display:grid;grid-template-columns:repeat(30,1fr);font-size:11px;color:#6a7484;text-align:center}
.cols.top{top:104px}.cols.bottom{bottom:104px}
.rows{position:absolute;left:72px;width:26px;display:grid;grid-template-rows:repeat(5,1fr);font-size:12px;color:#6a7484;font-weight:700;text-align:center}
.rows.top{top:148px;height:124px}.rows.bottom{top:348px;height:124px}
.holes{position:absolute;left:114px;width:812px;display:grid;grid-template-columns:repeat(30,18px);grid-template-rows:repeat(5,18px);gap:8px 9px}
.holes.top{top:146px}.holes.bottom{top:348px}
.hole{width:10px;height:10px;margin:4px;border-radius:50%;background:var(--hole);box-shadow:inset 0 1px 2px rgba(255,255,255,.15),inset 0 -1px 2px rgba(0,0,0,.35);cursor:pointer;position:relative;z-index:4}
.hole:hover,.hole.hover{outline:2px solid rgba(31,156,255,.6);outline-offset:3px}
.hole.ghost-pin-target{outline:2px solid rgba(245,158,11,.9);outline-offset:3px;box-shadow:0 0 0 5px rgba(245,158,11,.16),inset 0 1px 2px rgba(255,255,255,.15),inset 0 -1px 2px rgba(0,0,0,.35)}
.hole.wire-start{outline:2px solid rgba(34,197,94,.9);outline-offset:3px}
.mark{position:absolute;font-size:12px;font-weight:700;z-index:4}.mark.plus{color:var(--red)}.mark.minus{color:var(--blue)}
.m1{left:34px;top:26px}.m2{left:34px;top:60px}.m3{left:34px;bottom:60px}.m4{left:34px;bottom:26px}

.part{position:absolute;z-index:70;cursor:move;user-select:none;transform-origin:0 0;overflow:visible}
.part svg,.ghost svg{overflow:visible}
.part.selected{outline:2px dashed #f6c238;outline-offset:5px;border-radius:8px;z-index:90}
.pin{position:absolute;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #1f2937;background:#f8fafc;box-shadow:0 1px 3px rgba(0,0,0,.2);z-index:35;cursor:crosshair}
.pin:hover,.pin.wire-start{box-shadow:0 0 0 4px rgba(34,197,94,.22)}
.part-text{position:absolute;left:50%;top:100%;transform:translateX(-50%);margin-top:3px;background:rgba(255,255,255,.82);padding:1px 5px;border-radius:5px;text-align:center;line-height:1.2;white-space:nowrap;font-size:11px;color:#374151}
.part-text .value{color:#0f766e}
.wire-path{fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 2px rgba(0,0,0,.18));pointer-events:none}
.wire-hit{fill:none;stroke:transparent;stroke-width:18;pointer-events:stroke;cursor:pointer}
.wire-selected{filter:drop-shadow(0 0 6px rgba(255,193,7,.95))}
.wire-end-handle{fill:#fff;stroke:#f59e0b;stroke-width:3;filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));cursor:grab;pointer-events:all}
.wire-end-handle:hover{fill:#fff7ed;stroke-width:4}
.pin{touch-action:none}
.pin.drag-hint{box-shadow:0 0 0 4px rgba(245,158,11,.22)}
.part-pin-root{filter:drop-shadow(0 1px 2px rgba(0,0,0,.22))}
.part-lead-under{stroke:#fff;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.96}
.part-lead{stroke:#1f9cff;stroke-width:3.6;stroke-linecap:round;stroke-linejoin:round;fill:none}
.part-lead-hot{stroke:#f59e0b;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:5 5;opacity:.9}
.part-port-stub{stroke:#dbeafe;stroke-width:7;stroke-linecap:round;opacity:.98}
.part-lead-guide{stroke:#f59e0b;stroke-width:2;stroke-dasharray:4 4;opacity:.7}
.part-contact{fill:#ffffff;stroke:#0f172a;stroke-width:2.4;filter:drop-shadow(0 1px 2px rgba(0,0,0,.22))}
.pin-label-svg{font-size:9px;font-weight:700;fill:#334155;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round}
.temp-wire{fill:none;stroke:#22c55e;stroke-width:3;stroke-dasharray:7 6;stroke-linecap:round;pointer-events:none}
.ghost{position:absolute;z-index:100;pointer-events:none;opacity:.65;filter:drop-shadow(0 6px 12px rgba(0,0,0,.12));transform-origin:0 0;overflow:visible}
.ghost.hidden{display:none}

.sidebar{background:#fbfcfe;border-left:1px solid var(--line);padding:12px;overflow:auto;transition:padding .18s ease}
.sidebar.collapsed{padding:8px 4px;overflow:hidden}
.sidebar.collapsed .section{display:none}
.sidebar.collapsed #componentSection{display:block;padding:6px 3px;margin:0;border-radius:10px;text-align:center}
.sidebar.collapsed #componentSection .grid{display:none}
.sidebar.collapsed #componentSection h3{margin:0;justify-content:center}
.sidebar.collapsed #componentTitle{display:none}
.sidebar.collapsed #componentMinBtn{writing-mode:vertical-rl;padding:8px 4px;min-height:96px}
.section{background:#fff;border:1px solid #e2e7ef;border-radius:14px;padding:12px;margin-bottom:12px}
.section h3{margin:0 0 10px;font-size:13px;color:#4a5566;display:flex;align-items:center;justify-content:space-between;gap:8px}
.section-toggle{border:1px solid #d4dbe6;background:#fff;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;color:#516071}
.section.minimized .grid{display:none}
.section.minimized{padding-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.component{border:1px solid #dde5f0;border-radius:12px;background:#fff;padding:8px;cursor:pointer;min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center}
.component.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,156,255,.12)}
.component:hover{border-color:#b8c5d6;background:#fbfdff}
.component svg{width:76px;height:44px}.component b{font-size:12px}.component span{font-size:11px;color:#718096}
.inspector,.parts-list{font-size:12px;color:#516071}.muted{color:#7b8797}
.field{margin-bottom:10px}.field label{display:block;margin-bottom:5px;font-size:11px;color:#728195}
.field input,.field select{width:100%;border:1px solid #d7deea;border-radius:10px;padding:8px;background:#fff;color:#263244}
.checkrow{display:flex;align-items:center;gap:8px;margin:8px 0}.checkrow input{width:auto}
.action-row{display:flex;gap:8px;flex-wrap:wrap}.action-row button{border:1px solid #d4dbe6;background:#fff;padding:8px 10px;border-radius:10px;cursor:pointer}
.parts-list .item{padding:9px 0;border-bottom:1px solid #eef2f7;display:flex;justify-content:space-between;gap:10px}
.parts-list button{border:1px solid #dbe3ee;background:#fff;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:11px}
.kbd{display:inline-flex;min-width:22px;justify-content:center;padding:2px 6px;border-radius:6px;border:1px solid #cfd7e4;background:#fff;font-size:11px}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="brand-mark" aria-hidden="true"><span class="trace"></span><span class="node n1"></span><span class="node n2"></span><span class="node n3"></span></span><span class="brand-name"><strong>Breadboard Studio</strong><small>circuit workspace</small></span></div>
  <div class="spacer"></div><button class="pill">コード</button><button class="pill primary">シミュレーションを開始</button>
</div>
<div class="app" id="app">
  <aside class="lefttools" id="leftTools">
    <button class="toolbtn active" id="selectTool" title="選択">🖱️</button>
    <button class="toolbtn" id="moveTool" title="移動">✥</button>
    <button class="toolbtn" id="wireTool" title="配線">〰️</button>
    <button class="toolbtn" id="rotateTool" title="回転">⟳</button>
    <button class="toolbtn" id="deleteTool" title="削除">🗑️</button>
    <button class="toolbtn" id="zoomInTool" title="拡大">＋</button>
    <button class="toolbtn" id="zoomOutTool" title="縮小">－</button>
  </aside>
  <main class="main" id="main">
    <div class="toolbar">
      <button id="saveBtn">JSON保存</button><button id="loadBtn">JSON読込</button><button id="clearBtn">全消去</button><button id="netlistBtn">LTspiceネットリスト表示</button><button id="importNetlistBtn">LTspiceネットリスト入力</button>
      <input type="file" id="loadFile" accept="application/json" hidden>
    </div>
    <div id="workspace">
      <div class="stage">
        <div class="board" id="board">
          <svg id="wireLayer"></svg>
          <div class="rail top"><div class="stripe red"></div><div class="stripe blue"></div><div class="railholes red" id="topRed"></div><div class="railholes blue" id="topBlue"></div></div>
          <div class="rail bottom"><div class="stripe red"></div><div class="stripe blue"></div><div class="railholes red" id="bottomRed"></div><div class="railholes blue" id="bottomBlue"></div></div>
          <div class="center-cut"></div>
          <div class="mark plus m1">＋</div><div class="mark minus m2">－</div><div class="mark plus m3">＋</div><div class="mark minus m4">－</div>
          <div class="cols top" id="topCols"></div><div class="cols bottom" id="bottomCols"></div>
          <div class="rows top" id="topRows"></div><div class="rows bottom" id="bottomRows"></div>
          <div class="holes top" id="holesTop"></div><div class="holes bottom" id="holesBottom"></div>
        </div>
      </div>
    </div>
    <div class="ghost hidden" id="ghost"></div>
    <div class="status"><strong id="statusTitle">準備完了</strong><span id="statusText">右の素子を選び、ブレッドボードの穴をクリックして配置します。</span></div>
  </main>
  <aside class="sidebar">
    <div class="section" id="componentSection"><h3><span id="componentTitle">コンポーネント</span> <button class="section-toggle" id="componentMinBtn" type="button">最小化</button></h3><div class="grid" id="componentGrid"></div></div>
    <div class="section"><h3>選択中</h3><div class="inspector" id="inspector"><div class="muted">部品または配線をクリックしてください。</div></div></div>
    <div class="section"><h3>配置済み</h3><div class="parts-list" id="partsList"></div></div>
    <div class="section"><h3>使い方</h3><div class="inspector">部品カードをクリック → 穴をクリック。端子・穴を2回クリックで配線。Shiftクリックで複数選択。<br><span class="kbd">R</span> 配置ゴースト・選択部品の回転 / <span class="kbd">Del</span> 削除 / <span class="kbd">Esc</span> キャンセル / LTspiceネットリスト表示でコピー用テキストを表示 / LTspiceネットリスト入力で自動配線</div></div>
  </aside>
</div>

<script>

'use strict';

const board = document.getElementById('board');
const workspace = document.getElementById('workspace');

const sidebar = document.querySelector('.sidebar');

const inspector = document.getElementById('inspector');

const zoomOutTool = document.getElementById('zoomOutTool');

const topRed = document.getElementById('topRed');
const topBlue = document.getElementById('topBlue');
const bottomRed = document.getElementById('bottomRed');

  inductor:{

    icon:()=>`<svg viewBox="0 0 126 48"><line x1="8" y1="24" x2="22" y2="24" stroke="#919db0" stroke-width="4"/><path d="M22 24c0-15 16-15 16 0c0-15 16-15 16 0c0-15 16-15 16 0c0-15 16-15 16 0" fill="none" stroke="#a16207" stroke-width="5"/><line x1="86" y1="24" x2="118" y2="24" stroke="#919db0" stroke-width="4"/></svg>`,
